<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- sans-serif -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Geist</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Sans</string></edit>
  </match>

  <!-- system-ui -->
  <match target="pattern">
    <test qual="any" name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Geist</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>system-ui</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Sans</string></edit>
  </match>

  <!-- ui-sans-serif -->
  <match target="pattern">
    <test qual="any" name="family"><string>ui-sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Geist</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>ui-sans-serif</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Sans</string></edit>
  </match>

  <!-- serif -->
  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Serif</string></edit>
  </match>

  <!-- ui-serif -->
  <match target="pattern">
    <test qual="any" name="family"><string>ui-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Serif</string></edit>
  </match>

  <!-- monospace -->
  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Geist Mono</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Sans Mono</string></edit>
  </match>

  <!-- ui-monospace -->
  <match target="pattern">
    <test qual="any" name="family"><string>ui-monospace</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Geist Mono</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>ui-monospace</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Sans Mono</string></edit>
  </match>

</fontconfig>